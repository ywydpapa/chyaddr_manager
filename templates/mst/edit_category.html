<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">
    <title>충효예대학 원우관리</title>
    <!-- Custom fonts for this template-->
    <link href="/static/vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link
            href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
            rel="stylesheet">
    <!-- Custom styles for this template-->
    <link href="/static/css/sb-admin-2.min.css" rel="stylesheet">
</head>
<body id="page-top">
<!-- Page Wrapper -->
<div id="wrapper">
    {% include 'common/sidebar.html' %}
    <!-- Content Wrapper -->
    <div id="content-wrapper" class="d-flex flex-column">
        <!-- Main Content -->
        <div id="content">
            {% include 'common/topbar.html' %}
            <!-- Begin Page Content -->
            <div class="container-fluid">
                <!-- Page Heading -->
                <div class="row">
                    <div><h4 class="h3 mb-4 text-gray-800">케테고리 관리</h4></div>
                </div>
                <div class="d-flex justify-content-center" style="min-height: 100vh;">
                    <div class="col-md-9">
                        <table class="table table-bordered text-center" id="ranktable">
                            <tbody>
                            <form method="POST" action="/update_category/{{category_dtl[0]}}">
                                <tr>
                                    <td>카테고리명칭</td>
                                    <td><input type="text" class="form-control" name="cattitle"
                                               value="{{ category_dtl[1] }}"/></td>
                                </tr>
                                <tr>
                                    <td>영문명칭</td>
                                    <td><input type="text" class="form-control" name="cattitleeng"
                                               value="{{ category_dtl[2] }}"/>
                                    </td>
                                </tr>
                                <tr>
                                    <td>카테고리 구분</td>
                                    <td>
                                        <select name="cattype" id="cattype" class="form-control">
                                            <option value="MBIFO" {% if category_dtl[4]==
                                            "MBIFO" %}selected{% endif %}>개인정보</option>
                                            <option value="PRIZE" {% if category_dtl[4]==
                                            "PRIZE" %}selected{% endif %}>시상종류</option>
                                            <option value="MEMOR" {% if category_dtl[4]==
                                            "MEMOR" %}selected{% endif %}>경조사종류</option>
                                            <option value="ETC" {% if category_dtl[4]==
                                            "ETC" %}selected{% endif %}>그외..</option>
                                        </select>
                                    </td>
                                </tr>
                                <tr>
                                    <td>사용여부</td>
                                    <td>
                                        <select name="useyn" id="useyn" class="form-control">
                                            <option value="Y" {% if category_dtl[4]==
                                            "MBIFO" %}selected{% endif %}>사용</option>
                                            <option value="N" {% if category_dtl[4]==
                                            "PRIZE" %}selected{% endif %}>미사용</option>
                                        </select>
                                    </td>
                                </tr>
                                <tr>
                                    <td colspan="2">
                                        <div class="col-12"
                                             style="display: flex; justify-content: space-between; gap: 10px;">
                                            <a href="/categoryList" class="btn btn-dark" role="button"
                                               style="flex: 0 0 20%;">카테고리 목록</a>
                                            <button type="submit" class="btn btn-primary" style="flex: 0 0 30%;">저장
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            </form>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <!-- /.container-fluid -->
        </div>
    </div>
</div>
<!-- End of Main Content -->
{% include 'common/footer.html' %}
</div>
<!-- End of Content Wrapper -->
</div>
<!-- End of Page Wrapper -->
<!-- Scroll to Top Button-->
<a class="scroll-to-top rounded" href="#page-top">
    <i class="fas fa-angle-up"></i>
</a>
<!-- Logout Modal-->
<div class="modal fade" id="logoutModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel"
     aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="exampleModalLabel">Ready to Leave?</h5>
                <button class="close" type="button" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">×</span>
                </button>
            </div>
            <div class="modal-body">Select "Logout" below if you are ready to end your current session.</div>
            <div class="modal-footer">
                <button class="btn btn-secondary" type="button" data-dismiss="modal">Cancel</button>
                <a class="btn btn-primary" href="/logout">Logout</a>
            </div>
        </div>
    </div>
</div>
<!-- Bootstrap core JavaScript-->
{% include 'common/adscript.html' %}
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('msg') === 'success') {
            const toast = document.createElement('div');
            toast.innerText = "업데이트 되었습니다.";
            Object.assign(toast.style, {
                position: 'fixed',
                top: '20px',
                right: '20px',
                backgroundColor: '#1cc88a', /* SB Admin 2의 Success 컬러 */
                color: 'white',
                padding: '15px 25px',
                borderRadius: '5px',
                boxShadow: '0 4px 6px rgba(0,0,0,0.1)',
                zIndex: '9999',
                opacity: '1',
                transition: 'opacity 0.5s ease-in-out',
                fontWeight: 'bold'
            });
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => {
                    toast.remove();
                }, 500);
            }, 2000);
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    });
</script>
</body>
</html>
