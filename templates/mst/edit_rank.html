<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">

    <title>충효예대학 원우관리</title>

    <!-- Custom fonts for this template-->
    <link href="/static/vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link
            href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
            rel="stylesheet">

    <!-- Custom styles for this template-->
    <link href="/static/css/sb-admin-2.min.css" rel="stylesheet">

</head>

<body id="page-top">

<!-- Page Wrapper -->
<div id="wrapper">

    {% include 'common/sidebar.html' %}

    <!-- Content Wrapper -->
    <div id="content-wrapper" class="d-flex flex-column">

        <!-- Main Content -->
        <div id="content">

            {% include 'common/topbar.html' %}

            <!-- Begin Page Content -->
            <div class="container-fluid">
                <!-- Page Heading -->
                <div class="row">
                    <div><h4 class="h3 mb-4 text-gray-800">회원 직책 관리</h4></div>
                </div>
                <div class="d-flex justify-content-center" style="min-height: 100vh;">
                    <div class="col-md-9">
                        <table class="table table-bordered text-center" id="ranktable">
                            <tbody>
                            <form method="POST" action="/update_rank/{{rank_dtl[0]}}">
                                <tr>
                                    <td>직책명 (한글)</td>
                                    <td><input type="text" class="form-control" name="rankkor"
                                               value="{{ rank_dtl[1] }}"/></td>
                                </tr>
                                <tr>
                                    <td>직책명 (영문)</td>
                                    <td><input type="text" class="form-control" name="rankeng"
                                               value="{{ rank_dtl[2] }}"/>
                                    </td>
                                </tr>
                                <tr>
                                    <td>배치 순서</td>
                                    <td><input type="number" class="form-control" name="orderno"
                                               value="{{ rank_dtl[4] }}"/></td>
                                </tr>
                                <tr>
                                    <td>직책 구분</td>
                                    <td>
                                        <select name="ranktype" id="ranktype" class="form-control">
                                            <option value="HEADQ" {% if rank_dtl[3]==
                                            "CLUB" %}selected{% endif %}>본부직책</option>
                                            <option value="CLASS" {% if rank_dtl[3]==
                                            "DIST" %}selected{% endif %}>기수직책</option>
                                            <option value="CIRC" {% if rank_dtl[3]==
                                            "CIRC" %}selected{% endif %}>써클직책</option>
                                        </select>
                                    </td>
                                </tr>
                                <tr>
                                    <td>사용 여부</td>
                                    <td>
                                        <select name="useyn" id="useyn" class="form-control">
                                            <option value="Y" {% if rank_dtl[5]==
                                            "Y" %}selected{% endif %}>사용</option>
                                            <option value="N" {% if rank_dtl[5]==
                                            "N" %}selected{% endif %}>미사용</option>
                                        </select>
                                    </td>
                                </tr>
                                <tr>
                                    <td colspan="2">
                                        <div class="col-12"
                                             style="display: flex; justify-content: space-between; gap: 10px;">
                                            <a href="/rankList" class="btn btn-dark" role="button"
                                               style="flex: 0 0 20%;">직책 목록</a>
                                            <button type="submit" class="btn btn-primary" style="flex: 0 0 30%;">저장
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            </form>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <!-- /.container-fluid -->
        </div>
    </div>
    <!-- End of Main Content -->

    {% include 'common/footer.html' %}

</div>
<!-- End of Content Wrapper -->

</div>
<!-- End of Page Wrapper -->

<!-- Scroll to Top Button-->
<a class="scroll-to-top rounded" href="#page-top">
    <i class="fas fa-angle-up"></i>
</a>

<!-- Logout Modal-->
<div class="modal fade" id="logoutModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel"
     aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="exampleModalLabel">Ready to Leave?</h5>
                <button class="close" type="button" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">×</span>
                </button>
            </div>
            <div class="modal-body">Select "Logout" below if you are ready to end your current session.</div>
            <div class="modal-footer">
                <button class="btn btn-secondary" type="button" data-dismiss="modal">Cancel</button>
                <a class="btn btn-primary" href="/logout">Logout</a>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap core JavaScript-->
{% include 'common/adscript.html' %}

</body>

</html>
